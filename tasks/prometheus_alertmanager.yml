---
- name: Deploy Alertmanager config
  ansible.builtin.template:
    src: templates/prometheus_alertmanager.yml.j2
    dest: "{{ prometheus_alertmanager_config_path }}/alertmanager.yml"
    mode: "0755"
  tags:
    - prometheus_thanos
    - prometheus_reload

- name: Configure systemd service for Alertmanager
  ansible.builtin.template:
    src: prometheus_alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    mode: "0644"
  tags:
    - prometheus_thanos

- name: Enable and start Alertmanager
  ansible.builtin.systemd_service:
    name: alertmanager
    enabled: true
    state: restarted
    daemon_reload: true
  tags:
    - prometheus_thanos
    - prometheus_reload
