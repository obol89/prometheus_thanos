---
- name: Create Thanos directories
  ansible.builtin.file:
    path: "{{ thanos_compact_dir }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"
  tags:
    - prometheus_thanos

- name: Configure systemd service for Thanos Compact
  ansible.builtin.template:
    src: thanos-compact.service.j2
    dest: /etc/systemd/system/thanos-compact.service
    mode: "0644"
  tags:
    - prometheus_thanos

- name: Configure objstore.yml for Thanos Compact
  ansible.builtin.template:
    src: compact-objstore.yml.j2
    dest: "{{ thanos_config_dir }}/compact-objstore.yml"
    mode: "0644"
  tags:
    - prometheus_thanos

- name: Enable and start Thanos Compact
  ansible.builtin.systemd_service:
    name: thanos-compact
    state: restarted
    enabled: true
    daemon_reload: true
  tags:
    - prometheus_thanos
